version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: tiny-link-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: tiny-link-backend
    environment:
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
      TINYLINK_BASE_URL: http://localhost:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: tiny-link-frontend
    depends_on:
      - backend
    ports:
      - "8082:80"
