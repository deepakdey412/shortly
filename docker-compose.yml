version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: shortly-redis
    networks:
      - shortly-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: shortly-backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SHORTLY_BASE_URL: ${SHORTLY_BASE_URL:-http://localhost:8080}
      SHORTLY_CORS_ALLOWED_ORIGINS: ${SHORTLY_CORS_ALLOWED_ORIGINS:-http://localhost:8082,http://localhost:4200}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - shortly-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: shortly-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"
    networks:
      - shortly-network

networks:
  shortly-network:
    driver: bridge
