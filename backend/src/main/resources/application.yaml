spring:
  application:
    name: shortly
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
server:
  port: 8080

shortly:
  base-url: ${SHORTLY_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${SHORTLY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8082}
  short-code:
    length: 6
    max-attempts: 10
  rate-limit:
    requests-per-minute: 2
    requests-per-hour: 10
  cache:
    ttl-minutes: 30
  cleanup:
    interval-minutes: 1
    expired-urls-batch-size: 100

logging:
  level:
    com.deepax.shortly: DEBUG
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"